name: Daybreak

options:
  bundleIdPrefix: com.daybreak
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

fileGroups:
  - project.yml
  - README.md

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Developer Team ID here (or select a team in Xcode).
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO

targets:
  Daybreak:
    type: application
    platform: iOS
    sources:
      - path: Daybreak
        excludes:
          - "Info.plist"
          - "Daybreak.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daybreak.app
        PRODUCT_NAME: Daybreak
        INFOPLIST_FILE: Daybreak/Info.plist
        CODE_SIGN_ENTITLEMENTS: Daybreak/Daybreak.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: DaybreakWidgetExtension

  DaybreakWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DaybreakWidget
        excludes:
          - "Info.plist"
          - "DaybreakWidget.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daybreak.app.widget
        PRODUCT_NAME: DaybreakWidget
        INFOPLIST_FILE: DaybreakWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: DaybreakWidget/DaybreakWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES

  DaybreakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DaybreakTests
    dependencies:
      - target: Daybreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daybreak.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Daybreak.app/Daybreak"
        BUNDLE_LOADER: "$(TEST_HOST)"

  DaybreakUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - DaybreakUITests
    dependencies:
      - target: Daybreak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daybreak.app.uitests
        TEST_TARGET_NAME: Daybreak

schemes:
  Daybreak:
    build:
      targets:
        Daybreak: all
        DaybreakWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DaybreakTests
        - DaybreakUITests
